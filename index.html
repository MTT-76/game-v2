<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لعبة التحدي</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- 🔥 Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBR96UoLuF7FRnNbZwMJDNBpBjOFiDb7dU",
  authDomain: "quiz-game-b8a2b.firebaseapp.com",
  projectId: "quiz-game-b8a2b",
  storageBucket: "quiz-game-b8a2b.firebasestorage.app",
  messagingSenderId: "798634430060",
  appId: "1:798634430060:web:73bf383f6da8592f4a1249"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.getDocs = getDocs;
window.collection = collection;

</script>

</head>

<body>

<!-- إعداد الفرق -->
<div id="setup" class="screen active">
  <h2>🎮 إعداد الفرق</h2>

  <input id="team1" placeholder="اسم الفريق الأول">
  <input id="team2" placeholder="اسم الفريق الثاني">

  <button onclick="startGame()">ابدأ اللعبة</button>
</div>

<!-- لوحة -->
<div id="board" class="screen board"></div>

<!-- اللعب -->
<div id="play" class="screen">
  <div id="turn"></div>

  ⏱️ <span id="time">0</span>
  <button onclick="toggleTimer()">⏸</button>
  <button onclick="resetTimer()">🔄</button>

  <h2 id="question"></h2>
  <div id="qrcode"></div>

  <button onclick="showAnswer()">إظهار الإجابة</button>
</div>

<!-- الإجابة -->
<div id="answer" class="screen">
  <h2 id="answerText"></h2>

  <button onclick="givePoint(0)">لا أحد</button>
  <button onclick="givePoint(1)">الفريق 1</button>
  <button onclick="givePoint(2)">الفريق 2</button>
</div>

<script src="app.js"></script>

</body>
</html>
