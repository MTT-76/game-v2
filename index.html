<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تحدي الفرق</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start" class="screen active">
  <h1>🔥 تحدي الفرق</h1>
  <input id="team1" placeholder="الفريق الأول">
  <input id="team2" placeholder="الفريق الثاني">
  <button onclick="startGame()">ابدأ اللعبة</button>
</div>

<div id="boardScreen" class="screen">
  <div class="topbar">
    <div id="team1Btn"></div>
    <div id="team2Btn"></div>
  </div>
  <div id="board" class="board"></div>
</div>

<div id="play" class="screen">
  <h2 id="turn"></h2>
  <h1 id="question"></h1>
  <div class="timer" id="time">0</div>
  <button onclick="showAnswer()">إظهار الإجابة</button>
</div>

<div id="answer" class="screen">
  <h1 id="answerText"></h1>
  <button onclick="givePoint(1)">✔ فريق 1</button>
  <button onclick="givePoint(2)">✔ فريق 2</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
