<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تحدي الفرق</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="board" class="screen active"></div>

<div id="play" class="screen">
  <div class="topbar">
    <div>⏱️ <span id="time">0</span></div>
    <button onclick="toggleTimer()">⏸️</button>
    <button onclick="resetTimer()">🔄</button>
  </div>

  <h2 id="question"></h2>

  <button onclick="showAnswer()">إظهار الإجابة</button>
</div>

<div id="answer" class="screen">
  <h2 id="answerText"></h2>

  <button onclick="givePoint(0)">لا أحد</button>
  <button onclick="givePoint(1)">فريق 1</button>
  <button onclick="givePoint(2)">فريق 2</button>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
