<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Quiz Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <h1>🎮 Quiz Game Pro</h1>
</div>

<!-- SETUP -->
<div id="setup" class="card-box active">
  <h2>إعداد الفرق</h2>
  <input id="team1" placeholder="الفريق الأول">
  <input id="team2" placeholder="الفريق الثاني">
  <button onclick="startGame()">🚀 بدء اللعبة</button>
</div>

<!-- BOARD -->
<div id="boardScreen" class="card-box">
  <div class="topbar">
    <div id="turn"></div>
    <div id="score"></div>
  </div>

  <div id="board" class="board"></div>
</div>

<!-- PLAY -->
<div id="play" class="card-box">
  <h2 id="question"></h2>

  <div class="timer">
    ⏱ <span id="time">0</span>
  </div>

  <div class="controls">
    <button onclick="toggleTimer()">⏸️</button>
    <button onclick="resetTimer()">🔄</button>
    <button onclick="showAnswer()">👁</button>
  </div>
</div>

<!-- ANSWER -->
<div id="answer" class="card-box">
  <h2>الإجابة</h2>
  <p id="answerText"></p>

  <div class="controls">
    <button onclick="givePoint(1)">✔️ فريق 1</button>
    <button onclick="givePoint(2)">✔️ فريق 2</button>
  </div>
</div>

<!-- WINNER -->
<div id="winner" class="card-box">
  <h2 id="winnerText"></h2>
  <button onclick="restartGame()">🔄 لعبة جديدة</button>
</div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
