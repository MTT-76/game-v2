<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Quiz Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Setup -->
<div id="setup" class="screen active">
  <h1>إعداد اللعبة</h1>
  <input id="team1" placeholder="اسم الفريق الأول">
  <input id="team2" placeholder="اسم الفريق الثاني">
  <button onclick="startGame()">ابدأ</button>
</div>

<!-- Board -->
<div id="boardScreen" class="screen">
  <div class="topbar">
    <div id="turn"></div>
    <div id="score"></div>
  </div>
  <div id="board" class="board"></div>
</div>

<!-- Play -->
<div id="play" class="screen">
  <h2 id="question"></h2>
  <div class="timer">⏱ <span id="time">0</span></div>

  <button onclick="toggleTimer()">⏸️ إيقاف</button>
  <button onclick="resetTimer()">🔄 إعادة</button>
  <button onclick="showAnswer()">👁 عرض الإجابة</button>
</div>

<!-- Answer -->
<div id="answer" class="screen">
  <h2>الإجابة</h2>
  <p id="answerText"></p>

  <button onclick="givePoint(1)">✔️ فريق 1</button>
  <button onclick="givePoint(2)">✔️ فريق 2</button>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
